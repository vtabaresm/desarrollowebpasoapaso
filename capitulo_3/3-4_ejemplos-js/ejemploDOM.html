<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo JavaScript</title>
</head>

<body>
    <p id="mensaje">Texto original</p>

    <script>
        let elemento = document.getElementById("mensaje");
        elemento.textContent = "Texto modificado con JavaScript";
    </script>
</body>
</html>
